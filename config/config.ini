; ========================================
; AeroDb Configuration File
; ========================================
; Configuration pour l'application AeroDb
; Modifiable via l'interface de configuration
; ou directement dans ce fichier
;
; Dernière mise à jour: 2026-03-03
; ========================================

[General]
; Mode de l'application
; Valeurs possibles: dev, prod
; - dev: Affiche les outils de développement (simulateur, panneau WiFi)
; - prod: Interface utilisateur simplifiée
Environment = dev

; Source de données pour les instruments de vol
; Valeurs possibles: simulation, wifi, usb
; - simulation: Utilise le simulateur JSON intégré
; - wifi: Connexion WebSocket vers un microcontrôleur (ESP32/ESP8266)
; - usb: Connexion série USB
DataSource = simulation

[WiFi]
; Configuration de la connexion WiFi/WebSocket
; Adresse IP ou hostname du microcontrôleur
Host = 192.168.4.1

; Port WebSocket (défaut: 81)
Port = 81

[USB]
; Configuration de la connexion USB/Série
; Port série (Windows: COM3, Linux: /dev/ttyUSB0, Mac: /dev/cu.usbserial)
Port = COM3

; Débit de la liaison série (baud rate)
; Valeurs courantes: 9600, 19200, 38400, 57600, 115200
BaudRate = 115200

; ========================================
; Notes:
; ========================================
; - Les paramètres peuvent être modifiés via l'interface web
;   (bouton CONFIGURATION sur la page d'accueil)
; - Les changements sont sauvegardés dans localStorage
; - Pour synchroniser avec ce fichier, utilisez l'export de configuration
; - La configuration est chargée au démarrage de l'application
; ========================================

; ----- Gauges JSON fallback -----
; StartGauges
{
  "gauges": [
   
  ]
}
EndGauges

